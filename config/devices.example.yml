devices:
  - name: panorama-01
    host: 192.0.2.10
    vendor: panorama
    method: api
    api_key_env: PANORAMA_API_KEY
    verify_ssl: false
    timeout: 30
    # Leave commands unset to save a restore-loadable running-config XML file
    # using the PAN-OS export API: type=export&category=configuration.
    # You can also explicitly request that restore file with:
    # commands:
    #   - export-config
    # If you want an audit bundle instead, uncomment commands below.
    # commands:
    #   - system-info
    #   - panorama-status
    #   - connected-devices
    #   - managed-devices
    #   - device-groups
    #   - templates
    #   - template-stacks
    #   - plugins
    # Custom Panorama/PAN-OS operational command XML:
      # - name: commit-jobs
      #   type: op
      #   cmd: "<show><jobs><all></all></jobs></show>"
      # Custom Panorama config xpath:
      # - name: shared-addresses
      #   type: config
      #   action: show
      #   xpath: "/config/shared/address"

  - name: firewall-01
    host: 192.0.2.11
    vendor: panos
    method: api
    api_key_env: PANOS_API_KEY
    verify_ssl: false

  - name: switch-01
    host: 192.0.2.20
    vendor: generic
    method: placeholder
    username_env: SSH_USERNAME
    password_env: SSH_PASSWORD
